name: Weekly Update

on:
  schedule:
    # Run at Sunday 9:00 PM in Los Angeles time (DST handled automatically).
    - cron: "0 21 * * 0"
      timezone: "America/Los_Angeles"
  workflow_dispatch:
    inputs:
      force:
        description: "Send regardless of day/time"
        type: boolean
        default: true
      only:
        description: "Comma-separated section names (blank = all)"
        type: string
        default: ""

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Send weekly update
        env:
          SMTP_USER: dhrumil84@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: patel.dhrumil@protonmail.com
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "${{ inputs.only }}" ]; then ARGS="$ARGS --only ${{ inputs.only }}"; fi
          python update.py $ARGS

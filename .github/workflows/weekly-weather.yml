name: Weekly Weather Email

on:
  schedule:
    # GitHub Actions cron is UTC and ignores DST.
    # Sun 9pm Pacific = Mon 04:00 UTC (PDT) or Mon 05:00 UTC (PST).
    # We schedule both; the script's time guard makes sure only one actually sends.
    - cron: "0 4 * * 1"
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Send regardless of day/time"
        type: boolean
        default: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send forecast email
        env:
          SMTP_USER: dhrumil84@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: patel.dhrumil@protonmail.com
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python weather_email.py --force
          else
            python weather_email.py
          fi
